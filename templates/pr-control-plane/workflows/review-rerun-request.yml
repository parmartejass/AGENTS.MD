name: review-rerun-request

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions: {}

jobs:
  canonical-rerun-writer:
    name: review-rerun-request
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    env:
      CONTROL_PLANE_ROOT: automation/pr-control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gather PR context and existing comments
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(core.getInput("pr_number"))
              : context.issue.number;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 }
            );
            core.setOutput("pr_number", String(prNumber));
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("comments_json", JSON.stringify(comments.map((c) => ({ id: c.id, body: c.body || "" }))));

      - name: Evaluate canonical rerun dedupe
        env:
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          COMMENTS_JSON: ${{ steps.ctx.outputs.comments_json }}
        run: |
          python "${CONTROL_PLANE_ROOT}/scripts/request_rerun.py" \
            --contract "${CONTROL_PLANE_ROOT}/control-plane.contract.json" \
            --head-sha "${HEAD_SHA}" \
            --comments-json "${COMMENTS_JSON}" \
            --output-json rerun-request.json

      - name: Post rerun request when needed
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync("rerun-request.json", "utf8"));
            if (!result.shouldPost) {
              core.info(`SKIPPED: ${result.reason}`);
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: result.commentBody
            });
