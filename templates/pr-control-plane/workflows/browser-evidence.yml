name: Browser Evidence

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number (required for manual runs)
        required: true
        type: string
      head_sha:
        description: Head SHA override (optional for manual runs)
        required: false
        type: string

permissions: {}

jobs:
  browser-evidence:
    name: Browser Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      CONTROL_PLANE_ROOT: automation/pr-control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gather PR files and head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(core.getInput("pr_number"))
              : context.payload.pull_request.number;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );
            const headSha = core.getInput("head_sha") || pr.data.head.sha;
            core.setOutput("head_sha", headSha);
            core.setOutput("files_json", JSON.stringify(files.map((f) => f.filename)));

      - name: Validate browser evidence manifest
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          CHANGED_FILES_JSON: ${{ steps.pr.outputs.files_json }}
        run: |
          python "${CONTROL_PLANE_ROOT}/scripts/validate_browser_evidence.py" \
            --contract "${CONTROL_PLANE_ROOT}/control-plane.contract.json" \
            --head-sha "${HEAD_SHA}" \
            --changed-files-json "${CHANGED_FILES_JSON}" \
            --output-json browser-evidence-result.json

      - name: Upload evidence result
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-${{ steps.pr.outputs.head_sha }}
          path: browser-evidence-result.json
