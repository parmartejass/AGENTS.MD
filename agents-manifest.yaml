      keywords:
        - "excel"
        - "workbook"
        - ".xlsx"
        - ".xlsm"
        - ".xls"
        - "openpyxl"
        - "xlsxwriter"
        - "pyxlsb"
        - "python-calamine"
        - "calamine"
        - "pyexcelerate"
        - "polars"
        - "read_excel"
        - "to_excel"
        - "xlwings"
        - "win32com"
        - "macro"
        - "pivot refresh"
        - "external links"
      code_patterns:
        - "Excel.Application"
        - "xlwings"
        - "win32com.client"
        - "openpyxl"
        - "pyxlsb"
        - "python_calamine"
        - "pyexcelerate"
        - "polars"
        - "load_workbook"
        - "read_excel"
        - "to_excel"
        - "ExcelWriter"
        - "xlsxwriter"
      file_globs:
        - "*.xlsx"
        - "*.xlsm"
        - "*.xls"
    inject:
      - "docs/agents/40-config-constants/config-constants.md"
      - "docs/agents/30-logging-errors/logging-errors.md"
      - "docs/agents/70-io-data-integrity/io-data-integrity.md"
      - "docs/agents/playbooks/excel-library-selection-playbook/excel-library-selection-playbook.md"
      - "docs/agents/playbooks/excel-task-template/excel-task-template.md"

  excel_com:
